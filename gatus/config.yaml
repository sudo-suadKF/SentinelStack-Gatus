endpoints:
  - name: accenture-awards-recognition
    group: core
    url: "https://www.accenture.com/se-en/about/awards-recognition"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: accenture-about
    group: core
    url: "https://www.accenture.com/se-en/about/company-index"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: accenture-cloud-services
    group: core
    url: "https://www.accenture.com/se-en/services/cloud"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: accenture-insights
    group: core
    url: "https://www.accenture.com/se-en/insights"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: accenture-main-page
    group: core
    url: "https://www.accenture.com/se-en"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
