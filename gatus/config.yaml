endpoints:
  - name: västtrafik-västlänken
    group: core
    url: "https://www.vasttrafik.se/info/vastlanken/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: västtrafik-reseplanering
    group: core
    url: "https://www.vasttrafik.se/reseplanering/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: västtrafik-nyheter
    group: core
    url: "https://www.vasttrafik.se/om-vasttrafik/nyhetsarkiv/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: västtrafik-om-oss
    group: core
    url: "https://www.vasttrafik.se/om-vasttrafik/vasttrafik-ab/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: västtrafik-dns-query
    url: "8.8.8.8" # Address of the DNS server to use
    interval: 5m
    dns:
      query-name: "västtrafik.se"
      query-type: "A"
    conditions:
      - "[BODY] == pat(*.*.*.*)"  # Matches any IPv4 address
      - "[DNS_RCODE] == NOERROR"

  - name: västtrafik
    group: core
    url: "https://www.vasttrafik.se/"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
