endpoints:
  - name: digital-by-quokka-innovation
    group: core
    url: "https://digitalbyquokka.se/innovation"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: digital-by-quokka-about
    group: core
    url: "https://digitalbyquokka.se/about"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: digital-by-quokka
    group: core
    url: "https://digitalbyquokka.se/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: quokka-about
    group: core
    url: "https://quokka.se/about"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: quokka-dns-query
    url: "8.8.8.8" # Address of the DNS server to use
    interval: 5m
    dns:
      query-name: "quokka.se"
      query-type: "A"
    conditions:
      - "[BODY] == pat(*.*.*.*)"  # Matches any IPv4 address
      - "[DNS_RCODE] == NOERROR"

  - name: quokka-main-page
    group: core
    url: "https://quokka.se/"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
