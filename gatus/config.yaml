endpoints:
  - name: amaris-in-action
    group: core
    url: "https://amaris.com/amaris-in-action/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: amaris-contact-us
    group: core
    url: "https://amaris.com/contact-us/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: amaris-center-of-excellence
    group: core
    url: "https://amaris.com/amaris-centers-of-excellence/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: amaris-about-us
    group: core
    url: "https://amaris.com/about-us/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"

  - name: amaris-dns-query
    url: "8.8.8.8" # Address of the DNS server to use
    interval: 5m
    dns:
      query-name: "amaris.com"
      query-type: "A"
    conditions:
      - "[BODY] == pat(*.*.*.*)"  # Matches any IPv4 address
      - "[DNS_RCODE] == NOERROR"

  - name: amaris-main-page
    group: core
    url: "https://amaris.com/"
    interval: 1h
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 500"
